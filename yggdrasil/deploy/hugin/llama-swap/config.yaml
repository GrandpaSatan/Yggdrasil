# llama-swap config — Sprint 069 Phase F cutover (verified soak set).
#
# llama-swap fronts vLLM on Hugin. On each /v1/chat/completions call it spawns
# (or reuses) the vLLM process configured for the requested `model` id, proxies
# the request, and unloads the process after `ttl`.
#
# Caller model names remain identical to their Ollama counterparts where
# possible — Odin config.json cutover is a URL change only, never a
# model-name rename.
#
# vLLM image (verified on rocm.docs.amd.com, Apr 2026, smoke-tested on
# Hugin 2026-04-15 with both Qwen2.5 and the LFM2 saga-350m distilled
# model serving real chat completions end-to-end):
#   rocm/vllm-dev:rocm7.2.1_navi_ubuntu24.04_py3.12_pytorch_2.9_vllm_0.16.0
#   Official AMD-published Navi build; native gfx1150 / gfx1151.
#
# GPU routing (rocm-smi --showproductname on Hugin):
#   HIP_VISIBLE_DEVICES=0 → RX 9060 XT eGPU (gfx1200, 17 GiB) — large models
#     HSA_OVERRIDE_GFX_VERSION=12.0.0 forces the runtime to accept gfx1200
#   HIP_VISIBLE_DEVICES=1 → 890M iGPU (gfx1150, 2 GiB dedicated) — small models
#     HSA_OVERRIDE_GFX_VERSION=11.5.0 matches the image's gfx1150 build
#
# **Soak set** — only models verified loadable on this image. The original
# Ollama model fleet had 3 GGUF arches (gemma4, nemotron_h, lfm2-as-gguf)
# that the vLLM 0.16.1 transformers parser does not support. We carry
# them over as HF safetensors when needed in a follow-up sprint; for now
# the soak runs on the LFM2 family + Qwen2.5 baseline.
#
# Soak port: :11440 (parallel to Ollama on :11434). Flips to :11434 at
# cutover (after Ollama on Hugin is systemctl disabled).

healthCheckTimeout: 600
startPort: 8001
listen: 0.0.0.0:11440

logLevel: info
eventsFile: /var/log/llama-swap/events.jsonl

models:
  # ── LFM2 distilled specialists (Morrigan safetensors, iGPU) ──────────
  # Tokenizer config patched at staging time — the upstream
  # `tokenizer_class: TokenizersBackend` field is replaced with
  # `PreTrainedTokenizerFast` which the vLLM loader accepts.

  "saga-350m:latest":
    cmd: >-
      docker run --rm --device /dev/kfd --device /dev/dri
      -e HIP_VISIBLE_DEVICES=1 -e HSA_OVERRIDE_GFX_VERSION=11.5.0
      -e VLLM_USE_TRITON_FLASH_ATTN=0
      -v /opt/yggdrasil/models:/models:ro
      -p 8001:8000
      rocm/vllm-dev:rocm7.2.1_navi_ubuntu24.04_py3.12_pytorch_2.9_vllm_0.16.0
      vllm serve /models/saga-350m
      --served-model-name saga-350m:latest
      --max-model-len 2048
      --gpu-memory-utilization 0.20
      --port 8000
    proxy: "http://127.0.0.1:8001"
    ttl: 300

  "review-1.2b:latest":
    cmd: >-
      docker run --rm --device /dev/kfd --device /dev/dri
      -e HIP_VISIBLE_DEVICES=1 -e HSA_OVERRIDE_GFX_VERSION=11.5.0
      -e VLLM_USE_TRITON_FLASH_ATTN=0
      -v /opt/yggdrasil/models:/models:ro
      -p 8002:8000
      rocm/vllm-dev:rocm7.2.1_navi_ubuntu24.04_py3.12_pytorch_2.9_vllm_0.16.0
      vllm serve /models/review-1.2b
      --served-model-name review-1.2b:latest
      --max-model-len 2048
      --gpu-memory-utilization 0.20
      --port 8000
    proxy: "http://127.0.0.1:8002"
    ttl: 300

  "lfm25-tools:latest":
    cmd: >-
      docker run --rm --device /dev/kfd --device /dev/dri
      -e HIP_VISIBLE_DEVICES=1 -e HSA_OVERRIDE_GFX_VERSION=11.5.0
      -e VLLM_USE_TRITON_FLASH_ATTN=0
      -v /opt/yggdrasil/models:/models:ro
      -p 8003:8000
      rocm/vllm-dev:rocm7.2.1_navi_ubuntu24.04_py3.12_pytorch_2.9_vllm_0.16.0
      vllm serve /models/lfm25-tools-hf
      --served-model-name lfm25-tools:latest
      --max-model-len 2048
      --gpu-memory-utilization 0.20
      --port 8000
    proxy: "http://127.0.0.1:8003"
    ttl: 300

  # ── Generic baseline (Qwen2.5, iGPU) ─────────────────────────────────
  # Pulled from HuggingFace at first launch; subsequent runs use the
  # /opt/yggdrasil/models/hf-cache mount.
  "Qwen/Qwen2.5-0.5B-Instruct":
    cmd: >-
      docker run --rm --device /dev/kfd --device /dev/dri
      -e HIP_VISIBLE_DEVICES=1 -e HSA_OVERRIDE_GFX_VERSION=11.5.0
      -e VLLM_USE_TRITON_FLASH_ATTN=0
      -e HF_HOME=/cache
      -v /opt/yggdrasil/models/hf-cache:/cache
      -p 8004:8000
      rocm/vllm-dev:rocm7.2.1_navi_ubuntu24.04_py3.12_pytorch_2.9_vllm_0.16.0
      vllm serve Qwen/Qwen2.5-0.5B-Instruct
      --max-model-len 2048
      --gpu-memory-utilization 0.20
      --port 8000
    proxy: "http://127.0.0.1:8004"
    ttl: 300

# Models intentionally NOT in this slim soak config (each tracked with a
# follow-up note for the post-soak cutover sprint):
# - gemma4:e4b, gemma4:e2b      → GGUF arch unsupported by vLLM 0.16.1.
#   Pull HF safetensors of `google/gemma-3-4b-pt` / `gemma-3-2b-pt` later.
# - nemotron-3-nano:4b          → GGUF arch unsupported. Pull HF
#   safetensors of `nvidia/Nemotron-3-Nano-4B` later.
# - glm-4.7-flash:latest        → bartowski GGUF needs vLLM ≥ 0.17.x or
#   safetensors form. Stage in the follow-up.
# - fusion-v6                   → Morrigan checkpoint structure is
#   incomplete (no `best/` subdir matched). Find correct path on the
#   training VM in a follow-up.
# - mollysama/rwkv-7-g1e:2.9b   → RWKV, not vLLM-supported. Lives on
#   ai00_server :11436 (deploy/hugin/ai00-server/).
# - all-minilm                  → Embedding model, served by HF TEI on
#   Munin (deploy/munin/tei/).
